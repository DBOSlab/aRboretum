url: https://DBOSlab.github.io/aRboretum/

template:
  bootstrap: 5
  bootswatch: minty
  light-switch: true
  bslib:
    primary: "#2c5f2d"
    secondary: "#8aa17d"
    success: "#3f7d3b"
    info: "#5c8d89"
    warning: "#c59d3d"
    danger: "#8c3b3b"
    code-color: "#2c5f2d"

navbar:
  bg: primary
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Home
      href: index.html
    reference:
      text: Functions
      href: reference/index.html
    articles:
      text: Vignettes
      menu:
        - text: Quick start
          href: articles/quickstart.html
        - text: Personal audios
          href: articles/howto_audios.html
        - text: Personal photos
          href: articles/howto_photos.html
        - text: Community language example
          href: articles/add_lang.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/DBOSlab/aRboretum
      aria-label: GitHub repository

home:
  title: aRboretum
  description: >
    Generate multilingual, audio-enhanced HTML labels, QR codes,
    and mini-sites for botanical gardens, arboreta, and living plant collections.
  strip_header: false
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  links:
    - text: GitHub repository
      href: https://github.com/DBOSlab/aRboretum
    - text: Report an issue
      href: https://github.com/DBOSlab/aRboretum/issues

reference:
  - title: Main workflow
    desc: Core functions for preparing data and generating outputs.
    contents:
      - arboretum_data
      - arboretum_audios
      - arboretum_photos
      - arboretum_labels
      - arboretum_minisite
      - arboretum_qrcodes

  - title: Internal helpers
    desc: Low-level utilities used internally by the package.
    contents:
      - starts_with(".")

articles:
  - title: Getting started
    navbar: ~
    contents:
      - quickstart

  - title: Guides
    navbar: ~
    contents:
      - howto_audios
      - howto_photos
      - add_lang
      - aRboretum

footer:
  structure:
    left: developed_by
    right: built_with

development:
  mode: auto
